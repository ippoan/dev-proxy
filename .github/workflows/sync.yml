name: sync registry

# Aggregate .ippoan-dev.yaml across all ippoan org repos and open a PR if
# registry.json changed. Runs on schedule + on manual dispatch.
# Frontend repos can trigger this immediately after their merge by calling
# the "repository_dispatch" event with type=registry-sync.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [registry-sync]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate frontends → registry.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync.mjs --org ippoan --out registry.json

      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- registry.json; then
            echo "no changes"
            exit 0
          fi

          BRANCH="sync/registry-$(date -u +%Y%m%d%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add registry.json
          git commit -m "chore(registry): sync from ippoan org .ippoan-dev.yaml"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(registry): auto-sync from .ippoan-dev.yaml" \
            --body "Generated by .github/workflows/sync.yml (scripts/sync.mjs)." \
            --label automated || true
