<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="3">
<title>起動中 - {{PROJECT}}</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f6f7fb 0%, #e9ecf5 100%);
    color: #1f2937;
  }
  .card {
    text-align: center;
    padding: 3rem 2.5rem;
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(0, 0, 0, 0.05);
    border-radius: 16px;
    box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.15);
    max-width: 440px;
  }
  .spinner {
    width: 56px;
    height: 56px;
    border: 4px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    margin: 0 auto 1.5rem;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 0.5rem;
    font-weight: 600;
  }
  .project {
    color: #3b82f6;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  p {
    color: #6b7280;
    font-size: 0.9rem;
    margin: 0.5rem 0;
    line-height: 1.5;
  }
  .dots::after {
    display: inline-block;
    content: "";
    animation: dots 1.2s steps(4) infinite;
  }
  @keyframes dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
    100% { content: ""; }
  }
  @media (prefers-color-scheme: dark) {
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e5e7eb; }
    .card { background: rgba(30, 41, 59, 0.85); border-color: rgba(255, 255, 255, 0.08); }
    .spinner { border-color: #334155; border-top-color: #60a5fa; }
    p { color: #94a3b8; }
    .project { color: #60a5fa; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1><span class="project">{{PROJECT}}</span> <span class="dots">起動中</span></h1>
    <p>dev server が立ち上がるまで<br>このページは自動で再読込します。</p>
    <p style="font-size:0.75rem;opacity:0.6;margin-top:1.5rem">初回起動は 15〜30 秒ほどかかります</p>
  </div>
</body>
</html>
